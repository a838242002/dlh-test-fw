apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-spike-script
data:
  script.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';

    export const options = {
      vus: 5,
      duration: '60s',
      // Tag every metric with our scenario label so VM-side filtering works.
      // NOTE: `scenario` is reserved by k6 (set to the k6 scenario name, e.g.
      // "default"), so we namespace ours as `dlh_scenario`.
      tags: { dlh_scenario: 'spike-httpbin' },
    };

    export default function () {
      http.get('http://httpbin.dlh-test-fw.svc.cluster.local/status/200');
      sleep(1);
    }
