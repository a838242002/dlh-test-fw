name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.0
      - name: Cache subchart deps
        uses: actions/cache@v4
        with:
          path: helm/dlh-test-fw/charts
          key: helm-deps-${{ hashFiles('helm/dlh-test-fw/Chart.lock') }}
      - name: helm dependency update
        run: helm dependency update helm/dlh-test-fw
      - name: helm lint
        run: helm lint helm/dlh-test-fw
      - name: helm template (smoke)
        run: |
          helm template dlh helm/dlh-test-fw > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml
          grep -q 'kind: WorkflowTemplate' /tmp/rendered.yaml
          grep -q 'name: dlh-slos' /tmp/rendered.yaml

  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: verdict-job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: verdict-job/go.mod
          cache: true
          cache-dependency-path: verdict-job/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -S error
        with:
          scandir: scripts

  kubeconform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.0
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/kubeconform.tgz kubeconform
          kubeconform -v
      - name: helm dependency update
        run: helm dependency update helm/dlh-test-fw
      - name: helm template
        run: helm template dlh helm/dlh-test-fw > /tmp/rendered.yaml
      # -skip CustomResourceDefinition: Datree catalog has no meta-schema for CRD-of-CRD.
      # (Plan 12: Litmus ChaosExperiment skip removed — Litmus gone. Chaos Mesh
      # PodChaos/NetworkChaos/Schedule are present in Datree's catalog, no skip needed.)
      - name: Validate rendered chart
        run: |
          kubeconform -skip CustomResourceDefinition -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml
      # Same skip rationale as above.
      # Plan 18: scenarios/*.yaml is now empty (workflows moved to chart).
      - name: Validate scenarios/*.yaml
        run: |
          if compgen -G "scenarios/*.yaml" > /dev/null; then
            kubeconform -skip CustomResourceDefinition -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              scenarios/*.yaml
          else
            echo "No standalone scenarios/ files — skipping (Plan 18: scenarios moved into chart)"
          fi
      # New step — validates Argo CD AppProject / Application / ApplicationSet
      # manifests. The Datree CRD catalog covers argoproj.io/v1alpha1.
      - name: Validate argocd/ manifests
        run: |
          kubeconform -skip CustomResourceDefinition -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            $(find argocd -not -path '*/values/*' -name '*.yaml' | sort | tr '\n' ' ')
      - name: Validate chart render with framework values
        run: |
          helm template dlh helm/dlh-test-fw \
            -f helm/dlh-test-fw/values.yaml \
            -f argocd/values/framework/chart-values.yaml \
            > /tmp/rendered-framework.yaml
          kubeconform -skip CustomResourceDefinition -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered-framework.yaml

  controlplane:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: controlplane/go.mod
          cache: true
          cache-dependency-path: controlplane/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: controlplane/web/pnpm-lock.yaml
      - name: ui install
        run: pnpm install --frozen-lockfile
        working-directory: controlplane/web
      - name: ui build (with openapi types)
        run: pnpm openapi-typescript ../api/openapi.yaml -o src/api/gen.ts && pnpm build
        working-directory: controlplane/web
      - name: bootstrap dist for go:embed
        run: |
          rm -rf internal/api/dist
          cp -R web/dist internal/api/dist
        working-directory: controlplane
      - name: go vet
        run: go vet ./...
        working-directory: controlplane
      - name: go test
        run: go test ./...
        working-directory: controlplane
      - name: go build
        run: go build ./...
        working-directory: controlplane
      - name: go build (cli)
        run: go build ./cmd/dlh
        working-directory: controlplane
