apiVersion: v2
name: dlh-test-fw
description: Chaos + Load Test Platform — umbrella chart (Argo + Litmus + k6 + MinIO + VM + Grafana)
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
- name: argo-workflows
  version: 0.42.7
  repository: https://argoproj.github.io/argo-helm
  condition: argo-workflows.enabled
- name: litmus
  version: 3.28.0
  repository: https://litmuschaos.github.io/litmus-helm/
  condition: litmus.enabled
- name: k6-operator
  version: 4.4.1
  repository: https://grafana.github.io/helm-charts
  # NOTE: k6-operator 4.4.1's values.schema.json has additionalProperties:false at
  # the root and forbids the conventional `enabled` flag, so we cannot use a
  # `condition: k6-operator.enabled` toggle. Subchart is always installed.
- name: minio
  version: 14.10.5
  repository: https://charts.bitnami.com/bitnami
  condition: minio.enabled
- name: victoria-metrics-single
  version: 0.38.0
  repository: https://victoriametrics.github.io/helm-charts/
  condition: victoria-metrics-single.enabled
- name: grafana
  version: 8.15.0
  repository: https://grafana.github.io/helm-charts
  condition: grafana.enabled
