{{/*
  Litmus chaos-operator backfill — Plan 5 fills the gap left by the upstream
  litmus 3.x chart which ships only the portal/auth-server, not the runtime
  that reconciles ChaosEngines. Without this Deployment, ChaosEngine CRs
  just sit in the cluster and nothing happens.

  Also creates the `litmus` ServiceAccount in dlh-test-fw — the
  WorkflowTemplates (chaos-pod-delete et al.) set
  chaosServiceAccount: litmus on the ChaosEngines they spawn. The
  existing `dlh-litmus-cluster-admin-lite` ClusterRoleBinding already
  binds this SA to the cluster-admin-lite ClusterRole.

  Source: litmus-operator-v3.10.0.yaml (litmuschaos/litmus), rewritten
  to deploy into namespace dlh-test-fw with SA name dlh-litmus-operator.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus
  namespace: {{ include "dlh.namespace" . }}
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dlh-litmus-operator
  namespace: dlh-test-fw
  labels:
    app.kubernetes.io/name: dlh-litmus-operator
    # provide unique instance-id if applicable
    # app.kubernetes.io/instance: litmus-abcxzy
    app.kubernetes.io/version: v3.10.0
    app.kubernetes.io/component: operator-serviceaccount
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/managed-by: kubectl
    name: dlh-litmus-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dlh-litmus-operator
  labels:
    app.kubernetes.io/name: dlh-litmus-operator
    # provide unique instance-id if applicable
    # app.kubernetes.io/instance: litmus-abcxzy
    app.kubernetes.io/version: v3.10.0
    app.kubernetes.io/component: operator-clusterrole
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/managed-by: kubectl
    name: dlh-litmus-operator
rules:
  # *******************************************************************
  # Permissions needed for creation and discovery of chaos component
  # *******************************************************************

# for checking app parent resources if they are eligible chaos candidates
- apiGroups: [""]
  resources: ["replicationcontrollers"]
  verbs: ["get","list"]

# for checking app parent resources if they are eligible chaos candidates
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get","list"]

# for checking (openshift) app parent resources if they are eligible chaos candidates
- apiGroups: ["apps.openshift.io"]
  resources: ["deploymentconfigs"]
  verbs: ["get","list"]

# for operator to perform asset discovery of available resources on the cluster which can be picked as a target for chaos
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
  verbs: ["get","list"]

# for operator to perform asset discovery of experiment jobs
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get","list"]

# for checking (argo) app parent resources if they are eligible chaos candidates
- apiGroups: ["argoproj.io"]
  resources: ["rollouts"]
  verbs: ["get","list"]

# for creating and monitoring the chaos-runner pods
- apiGroups: [""]
  resources: ["pods","events"]
  verbs: ["get","create","update","patch","delete","list","watch","deletecollection"]

# for operator to create or get the service for mertics
- apiGroups: [""]
  resources: ["services"]
  verbs: ["create","update","get","list","watch","delete"]

# for operator to create and manage configmap to handle race condition
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create","update","get","list","watch","delete"]

# for operator to perform removal of experiment jobs
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["delete","deletecollection"]

# for creation, status polling and deletion of litmus chaos resources used within an experiment
- apiGroups: ["litmuschaos.io"]
  resources: ["chaosengines","chaosexperiments","chaosresults"]
  verbs: ["get","create","update","patch","delete","list","watch","deletecollection"]

# for validation of existance of chaosresult crd
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["list","get"]

# for managing litmus resource deletion
- apiGroups: ["litmuschaos.io"]
  resources: ["chaosengines/finalizers"]
  verbs: ["update"]

# for leader election in case of multireplica
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get","create","list","update","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dlh-litmus-operator
  labels:
    app.kubernetes.io/name: dlh-litmus-operator
    # provide unique instance-id if applicable
    # app.kubernetes.io/instance: litmus-abcxzy
    app.kubernetes.io/version: v3.10.0
    app.kubernetes.io/component: operator-clusterrolebinding
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/managed-by: kubectl
    name: dlh-litmus-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dlh-litmus-operator
subjects:
- kind: ServiceAccount
  name: dlh-litmus-operator
  namespace: dlh-test-fw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: dlh-litmus-operator
    # provide unique instance-id if applicable
    # app.kubernetes.io/instance: litmus-abcxzy
    app.kubernetes.io/version: v3.10.0
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/managed-by: kubectl
    name: dlh-litmus-operator
  name: chaos-operator-ce
  namespace: dlh-test-fw
spec:
  replicas: 1
  selector:
    matchLabels:
      name: chaos-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dlh-litmus-operator
        # provide unique instance-id if applicable
        # app.kubernetes.io/instance: litmus-abcxzy
        app.kubernetes.io/version: v3.10.0
        app.kubernetes.io/component: operator
        app.kubernetes.io/part-of: litmus
        app.kubernetes.io/managed-by: kubectl
        name: chaos-operator
    spec:
      serviceAccountName: dlh-litmus-operator
      containers:
        - name: chaos-operator
          image: litmuschaos.docker.scarf.sh/litmuschaos/chaos-operator:3.10.0
          command:
          - chaos-operator
          args:
          - -leader-elect=true
          imagePullPolicy: Always
          env:
            - name: CHAOS_RUNNER_IMAGE
              value: "litmuschaos.docker.scarf.sh/litmuschaos/chaos-runner:3.10.0"
            - name: WATCH_NAMESPACE
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPERATOR_NAME
              value: "chaos-operator"
