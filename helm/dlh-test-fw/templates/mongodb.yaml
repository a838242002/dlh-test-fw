{{- /*
  In-tree single-node MongoDB replicaset for Litmus.

  The Bitnami `mongodb` subchart shipped by litmus 3.28.0 references images
  (`bitnamilegacy/mongodb`, `bitnamilegacy/os-shell`) that were yanked from
  Docker Hub by Bitnami's 2025 secure-images migration. The replacement
  `bitnamisecure/mongodb:latest` exits silently inside the helm chart's pod
  spec (works under `docker run` — almost certainly a chart-template/image
  contract drift). Rather than untangle that, we ship our own minimal mongo
  using the upstream `mongo:6` image and disable the subchart in values.yaml.

  Litmus requires:
    - DNS `dlh-mongodb-0.dlh-mongodb-headless` resolves (init waits on it)
    - `rs.status()` returns `ok`
    - DB clients can connect with the URL from `adminConfig.DB_SERVER`

  No auth: spike-grade, namespace-isolated. Litmus's `DBUSER` / `DBPASSWORD`
  env vars are ignored by mongo when auth is off. Promote to keyFile-auth
  before any production deploy.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: dlh-mongodb-headless
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 27017
    name: mongodb
  selector:
    app.kubernetes.io/component: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: dlh-mongodb
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: ClusterIP
  ports:
  - port: 27017
    name: mongodb
  selector:
    app.kubernetes.io/component: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dlh-mongodb
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  serviceName: dlh-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "dlh.labels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongodb
        image: mongo:6
        args:
        - --bind_ip_all
        - --replSet
        - rs0
        - --dbpath
        - /data/db
        ports:
        - containerPort: 27017
          name: mongodb
        readinessProbe:
          tcpSocket: { port: 27017 }
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          tcpSocket: { port: 27017 }
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 768Mi }
        volumeMounts:
        - name: data
          mountPath: /data/db
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                # Wait for mongod to be up, then ensure a single-node replicaset.
                # Idempotent: rs.initiate() throws AlreadyInitialized if already done.
                for i in $(seq 1 60); do
                  if mongosh --quiet --eval 'db.adminCommand({ping:1}).ok' >/dev/null 2>&1; then
                    break
                  fi
                  sleep 2
                done
                mongosh --quiet --eval '
                  try {
                    rs.status();
                  } catch (e) {
                    rs.initiate({
                      _id: "rs0",
                      members: [
                        { _id: 0, host: "dlh-mongodb-0.dlh-mongodb-headless.{{ include "dlh.namespace" . }}.svc.cluster.local:27017" }
                      ]
                    });
                  }
                ' >/tmp/rs-init.log 2>&1 || true
                # Wait for PRIMARY then create the litmus auth user.
                # Mongo is started without --auth, but the litmus init container
                # connects as `mongosh -u litmus -p ... URL`, which forces a SCRAM
                # auth attempt. With an empty users collection SCRAM fails, so we
                # must create the user so auth succeeds. The password matches
                # litmus.adminConfig.DBPASSWORD in values.yaml.
                for j in $(seq 1 30); do
                  state=$(mongosh --quiet --eval 'rs.status().members[0].stateStr' 2>/dev/null | tail -1)
                  [[ "$state" == "PRIMARY" ]] && break
                  sleep 2
                done
                mongosh --quiet --eval '
                  try {
                    db.getSiblingDB("admin").createUser({
                      user: "litmus",
                      pwd:  "noauth-but-required-by-init-container",
                      roles: [{ role: "root", db: "admin" }]
                    });
                  } catch (e) {
                    /* user already exists */
                  }
                ' >>/tmp/rs-init.log 2>&1 || true
      volumes:
      - name: data
        emptyDir:
          sizeLimit: 4Gi
