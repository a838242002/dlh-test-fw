{{/*
  RBAC for the argo-workflow ServiceAccount so scenario Workflows can:
    - create Schedule/PodChaos/NetworkChaos (chaos-mesh.org)  used by chaos-* WTs
    - create TestRuns (k6.io)                                 used by load-k6-run WT
    - create/get/update ConfigMaps                            used by prep-slo step writing dlh-slo-<wf>

  Plan 4 set up the original litmuschaos.io rules; Plan 12 retired those
  in favour of chaos-mesh.org. The ClusterRole below covers the additional
  cross-namespace access Chaos Mesh's admission webhook demands.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dlh-argo-workflow-scenarios
  namespace: {{ include "dlh.namespace" . }}
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
rules:
- apiGroups: ["chaos-mesh.org"]
  resources: ["podchaos", "networkchaos", "schedules"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: ["k6.io"]
  resources: ["testruns"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
# Plan 16 (2026-05-22): Argo's HTTP-template agent (argoexec agent) runs
# under the argo-workflow SA and needs:
#   - get+watch on workflowtasksets: to receive task assignments from ctrl
#   - patch on workflowtasksets/status: to push http result back to ctrl
# Without these every http step stays Pending indefinitely.
- apiGroups: ["argoproj.io"]
  resources: ["workflowtasksets"]
  verbs: ["get", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["workflowtasksets/status"]
  verbs: ["patch"]
- apiGroups: ["argoproj.io"]
  resources: ["workflowtaskresults"]
  verbs: ["create", "patch"]
# Plan 16 (2026-05-22): The chaos WT's post-chaos http template sends
# X-Internal-Token from a secretKeyRef. The Argo agent mounts the secret
# value at step execution time — argo-workflow SA needs secret get access.
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["dlh-internal-token"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dlh-argo-workflow-scenarios
  namespace: {{ include "dlh.namespace" . }}
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dlh-argo-workflow-scenarios
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: {{ include "dlh.namespace" . }}
---
# Plan 12: Chaos Mesh's vauth.kb.io admission webhook validates that the
# subject creating a chaos CR (Schedule/PodChaos/NetworkChaos/...) has
# the underlying k8s verbs on the *target* namespace's pods. Grant the
# argo-workflow SA cluster-wide pod read + delete so scenario workflows
# can target mysql-sys/kafka-sys/doris-sys without per-namespace bindings.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dlh-argo-workflow-chaos-targets
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Chaos Mesh's vauth.kb.io webhook (SECURITY_MODE=true) performs a
# SubjectAccessReview where the *verb* is the chaos action name
# (e.g., "pod-kill", "delay", "loss") and the resource is the kind
# (e.g., "podchaos"). The target namespace is what the chaos resource
# selects, not where it lives. Grant `*` on chaos-mesh.org so any
# present or future action name we use (and the standard CRUD verbs
# needed to create the wrapper CR itself) is covered.
- apiGroups: ["chaos-mesh.org"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dlh-argo-workflow-chaos-targets
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dlh-argo-workflow-chaos-targets
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: {{ include "dlh.namespace" . }}
# Plan 16 (2026-05-22): dlh-controlplane also creates chaos CRs on behalf
# of workflows (via /internal/chaos). Chaos Mesh's vauth.kb.io webhook
# performs the same SubjectAccessReview against the creating SA, so the
# controlplane SA needs the same cluster-wide permissions as argo-workflow.
- kind: ServiceAccount
  name: dlh-controlplane
  namespace: {{ include "dlh.namespace" . }}
