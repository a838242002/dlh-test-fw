{{- /*
  Minimal upstream MinIO (standalone) Deployment + Service.
  Replaces the Bitnami minio subchart, which became unusable in 2025 when
  Bitnami yanked their public Docker images. Service name kept as `dlh-minio`
  so existing ingress / artifact-repo / bootstrap-job references work.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ include "dlh.namespace" . }}
  labels: {{- include "dlh.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-minio-console
  namespace: {{ include "dlh.namespace" . }}
  labels: {{- include "dlh.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: console
    port: 9001
    targetPort: 9001
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-minio
  namespace: {{ include "dlh.namespace" . }}
  labels: {{- include "dlh.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: minio
        image: {{ .Values.platform_minio_image | default "minio/minio:RELEASE.2024-12-13T22-19-12Z" }}
        args: ["server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          valueFrom: { secretKeyRef: { name: minio-root-credentials, key: root-user } }
        - name: MINIO_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: minio-root-credentials, key: root-password } }
        ports:
        - name: api
          containerPort: 9000
        - name: console
          containerPort: 9001
        readinessProbe:
          httpGet: { path: /minio/health/ready, port: 9000 }
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /minio/health/live, port: 9000 }
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
