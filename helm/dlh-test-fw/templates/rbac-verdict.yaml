apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-verdict
  namespace: {{ include "dlh.namespace" . }}
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
rules:
- apiGroups: ["litmuschaos.io"]
  resources: ["chaosresults"]
  verbs: ["get", "list", "watch"]
# Note: verdict-job used to patch a `dlh-result-<workflow>` ConfigMap; the
# full report.json + report.html now ship as an Argo workflow artifact to
# the MinIO `artifacts` bucket instead. ConfigMap verbs no longer needed.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-verdict
  namespace: {{ include "dlh.namespace" . }}
  labels:
    {{- include "dlh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-verdict
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: {{ include "dlh.namespace" . }}
