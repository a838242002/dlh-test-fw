# Overrides for local minikube. Apply with `-f values.yaml -f values-minikube.yaml`,
# or rely on Makefile which passes both.
platform:
  ingress:
    enabled: true                       # minikube has the ingress addon
    className: nginx                    # minikube's ingress addon uses ingress-nginx

# MinIO subchart removed (see Chart.yaml). Our minimal minio template
# (templates/minio.yaml) is already low-resource and ephemeral.

victoria-metrics-single:
  server:
    persistentVolume:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

grafana:
  persistence:
    enabled: false
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 256Mi }

argo-workflows:
  controller:
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }
  server:
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }
