# Plan 16 (2026-05-22): chaos lifecycle moved out of kubectl-in-script
# and into controlplane's /internal/chaos endpoint. The WT now POSTs the
# Schedule body to the controlplane via Argo's http template; the
# cleanup step DELETEs the chaos ref to bound the chaos window even if
# the workflow is terminated.
#
# Note: Argo v3.6.x HTTP template does NOT populate outputs.parameters
# from valueFrom.jsonPath — only outputs.result (raw body string) is
# captured.  The cleanup step therefore accepts the full JSON result from
# the post step and extracts the ref with jq inside a script template.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: chaos-pod-delete
  labels:
    dlh.category: chaos
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
  - name: main
    inputs:
      parameters:
      - name: target_namespace
      - name: target_pod_selector
      - name: duration
      - name: interval
    steps:
    - - name: build-body
        template: build-podchaos-body
        arguments:
          parameters:
          - { name: target_namespace, value: '{{`{{inputs.parameters.target_namespace}}`}}' }
          - { name: target_pod_selector, value: '{{`{{inputs.parameters.target_pod_selector}}`}}' }
          - { name: interval, value: '{{`{{inputs.parameters.interval}}`}}' }
    - - name: post
        template: post-chaos
        arguments:
          parameters:
          - { name: body, value: '{{`{{steps.build-body.outputs.parameters.body}}`}}' }
    - - name: wait
        template: wait-window
        arguments:
          parameters:
          - { name: duration, value: '{{`{{inputs.parameters.duration}}`}}' }
    - - name: cleanup
        template: cleanup-chaos
        arguments:
          parameters:
          # Pass the full JSON result from the POST step; the cleanup template
          # extracts the ref with jq (Argo HTTP outputs.parameters.valueFrom.jsonPath
          # is not supported in v3.6.x — only outputs.result is populated).
          - { name: post_result, value: '{{`{{steps.post.outputs.result}}`}}' }

  - name: build-podchaos-body
    inputs:
      parameters:
      - name: target_namespace
      - name: target_pod_selector
      - name: interval
    outputs:
      parameters:
      - name: body
        valueFrom: { path: /tmp/body.json }
    script:
      image: alpine/k8s:1.30.0
      command: [bash]
      source: |
        set -euo pipefail
        SEL='{{`{{inputs.parameters.target_pod_selector}}`}}'
        KEY="${SEL%%=*}"
        VAL="${SEL#*=}"
        jq -n \
          --arg ns '{{`{{inputs.parameters.target_namespace}}`}}' \
          --arg interval '{{`{{inputs.parameters.interval}}`}}' \
          --arg key "$KEY" \
          --arg val "$VAL" \
          '{
            apiVersion: "chaos-mesh.org/v1alpha1",
            kind: "Schedule",
            metadata: { generateName: "dlh-pod-kill-" },
            spec: {
              schedule: "@every \($interval)",
              historyLimit: 10,
              concurrencyPolicy: "Forbid",
              type: "PodChaos",
              podChaos: {
                action: "pod-kill",
                mode: "one",
                gracePeriod: 30,
                selector: {
                  namespaces: [$ns],
                  labelSelectors: { ($key): $val }
                }
              }
            }
          }' > /tmp/body.json

  - name: post-chaos
    inputs:
      parameters:
      - name: body
    http:
      url: 'http://dlh-controlplane.dlh-test-fw.svc.cluster.local:80/internal/chaos?runID={{`{{workflow.name}}`}}'
      method: POST
      headers:
      - name: X-Internal-Token
        valueFrom:
          secretKeyRef: { name: dlh-internal-token, key: token }
      - name: Content-Type
        value: application/json
      body: '{{`{{inputs.parameters.body}}`}}'
      successCondition: 'response.statusCode == 201'

  - name: wait-window
    inputs:
      parameters:
      - name: duration
    container:
      image: alpine:3.20
      command: [sh, -c]
      args: ['sleep ${DURATION%s}']
      env:
      - name: DURATION
        value: '{{`{{inputs.parameters.duration}}`}}'

  - name: cleanup-chaos
    inputs:
      parameters:
      - name: post_result
    script:
      image: alpine/k8s:1.30.0
      command: [bash]
      source: |
        set -euo pipefail
        TOKEN=$(cat /var/run/secrets/dlh-internal-token/token)
        REF=$(echo '{{`{{inputs.parameters.post_result}}`}}' | jq -r '.ref')
        if [ -z "$REF" ] || [ "$REF" = "null" ]; then
          echo "No ref in post_result — nothing to clean up"
          exit 0
        fi
        echo "Deleting chaos ref: $REF"
        curl -fsSL -X DELETE \
          "http://dlh-controlplane.dlh-test-fw.svc.cluster.local:80/internal/chaos/${REF}" \
          -H "X-Internal-Token: ${TOKEN}" \
          -o /dev/null -w "HTTP %{http_code}\n"
      volumeMounts:
      - name: dlh-internal-token-vol
        mountPath: /var/run/secrets/dlh-internal-token
    volumes:
    - name: dlh-internal-token-vol
      secret:
        secretName: dlh-internal-token
