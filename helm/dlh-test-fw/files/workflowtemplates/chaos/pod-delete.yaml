# Plan 12 (2026-05-19): rewritten to use Chaos Mesh Schedule + PodChaos
# instead of Litmus ChaosEngine. A single script step:
#   1. creates a Schedule CR (re-applies pod-kill every `interval`),
#   2. sleeps for `duration`,
#   3. deletes the Schedule so it stops producing children.
# This bounds chaos cleanly within the chaos window — without explicit
# delete the Schedule would keep killing target pods past the window
# and torpedo the recovery-phase SLO.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: chaos-pod-delete
  labels:
    dlh.category: chaos
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
  - name: main
    inputs:
      parameters:
      - name: target_namespace
      - name: target_pod_selector      # "key=value" form (Litmus convention preserved)
      - name: duration                 # e.g. "60s"
      - name: interval                 # e.g. "10s"
    script:
      image: alpine/k8s:1.30.0
      command: [bash]
      source: |
        set -euo pipefail
        # Parse "key=value" selector into the labelSelectors map form.
        SEL='{{`{{inputs.parameters.target_pod_selector}}`}}'
        KEY="${SEL%%=*}"
        VAL="${SEL#*=}"
        DURATION='{{`{{inputs.parameters.duration}}`}}'
        # Strip trailing "s" for sleep(1) — input is duration like "60s".
        SLEEP_SECS="${DURATION%s}"

        SCHED_NAME=$(kubectl create -f - -o jsonpath='{.metadata.name}' <<EOF
        apiVersion: chaos-mesh.org/v1alpha1
        kind: Schedule
        metadata:
          generateName: dlh-pod-kill-
          namespace: {{`{{workflow.namespace}}`}}
          labels:
            dlh.workflow: {{`{{workflow.name}}`}}
        spec:
          schedule: '@every {{`{{inputs.parameters.interval}}`}}'
          historyLimit: 10
          concurrencyPolicy: Forbid
          type: PodChaos
          podChaos:
            action: pod-kill
            mode: one
            # gracePeriod 30 lets the pod terminate gracefully (matches
            # Litmus pod-delete semantics) rather than Chaos Mesh's
            # default gracePeriod=0 SIGKILL.
            gracePeriod: 30
            selector:
              namespaces:
              - {{`{{inputs.parameters.target_namespace}}`}}
              labelSelectors:
                $KEY: $VAL
        EOF
        )
        echo "created schedule/$SCHED_NAME; sleeping ${SLEEP_SECS}s"
        sleep "$SLEEP_SECS"
        echo "chaos window elapsed; deleting schedule/$SCHED_NAME"
        kubectl delete schedule "$SCHED_NAME" -n {{`{{workflow.namespace}}`}} --wait=false || true
