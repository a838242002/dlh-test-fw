# Plan 16 (2026-05-22): kafka broker partition via /internal/chaos.
# NetworkChaos action=partition direction=to (no target selector — see
# FINDINGS #5: only direction=both requires a target selector).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: chaos-kafka-broker-partition
  labels:
    dlh.category: chaos
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
  - name: main
    inputs:
      parameters:
      - name: kafka_namespace
      - name: broker_id
      - name: duration
    steps:
    - - name: build-body
        template: build-partition-body
        arguments:
          parameters:
          - { name: kafka_namespace, value: '{{`{{inputs.parameters.kafka_namespace}}`}}' }
          - { name: broker_id, value: '{{`{{inputs.parameters.broker_id}}`}}' }
          - { name: duration, value: '{{`{{inputs.parameters.duration}}`}}' }
    - - name: post
        template: post-chaos
        arguments:
          parameters:
          - { name: body, value: '{{`{{steps.build-body.outputs.parameters.body}}`}}' }
    - - name: wait
        template: wait-window
        arguments:
          parameters:
          - { name: duration, value: '{{`{{inputs.parameters.duration}}`}}' }
    - - name: cleanup
        template: cleanup-chaos
        arguments:
          parameters:
          # Pass full JSON result; cleanup extracts ref with jq
          # (Argo v3.6.x HTTP template does not populate outputs.parameters.valueFrom.jsonPath)
          - { name: post_result, value: '{{`{{steps.post.outputs.result}}`}}' }

  - name: build-partition-body
    inputs:
      parameters:
      - name: kafka_namespace
      - name: broker_id
      - name: duration
    outputs:
      parameters:
      - name: body
        valueFrom: { path: /tmp/body.json }
    script:
      image: alpine/k8s:1.30.0
      command: [bash]
      source: |
        set -euo pipefail
        jq -n \
          --arg ns '{{`{{inputs.parameters.kafka_namespace}}`}}' \
          --arg bid '{{`{{inputs.parameters.broker_id}}`}}' \
          --arg duration '{{`{{inputs.parameters.duration}}`}}' \
          '{
            apiVersion: "chaos-mesh.org/v1alpha1",
            kind: "NetworkChaos",
            metadata: { generateName: "dlh-kafka-partition-" },
            spec: {
              action: "partition",
              mode: "all",
              duration: $duration,
              selector: {
                namespaces: [$ns],
                labelSelectors: {
                  "app": "kafka",
                  "kafka.broker.id": $bid
                }
              },
              direction: "to"
            }
          }' > /tmp/body.json

  - name: post-chaos
    inputs:
      parameters:
      - name: body
    http:
      url: 'http://dlh-controlplane.dlh-test-fw.svc.cluster.local:80/internal/chaos?runID={{`{{workflow.name}}`}}'
      method: POST
      headers:
      - name: X-Internal-Token
        valueFrom: { secretKeyRef: { name: dlh-internal-token, key: token } }
      - name: Content-Type
        value: application/json
      body: '{{`{{inputs.parameters.body}}`}}'
      successCondition: 'response.statusCode == 201'

  - name: wait-window
    inputs:
      parameters:
      - name: duration
    container:
      image: alpine:3.20
      command: [sh, -c]
      args: ['sleep ${DURATION%s}']
      env: [{ name: DURATION, value: '{{`{{inputs.parameters.duration}}`}}' }]

  - name: cleanup-chaos
    inputs:
      parameters:
      - name: post_result
    script:
      image: alpine/k8s:1.30.0
      command: [bash]
      source: |
        set -euo pipefail
        TOKEN=$(tr -d '\n' < /var/run/secrets/dlh-internal-token/token)
        REF=$(echo '{{`{{inputs.parameters.post_result}}`}}' | jq -r '.ref')
        if [ -z "$REF" ] || [ "$REF" = "null" ]; then
          echo "No ref in post_result — nothing to clean up"
          exit 0
        fi
        echo "Deleting chaos ref: $REF"
        curl -fsSL -X DELETE \
          "http://dlh-controlplane.dlh-test-fw.svc.cluster.local:80/internal/chaos/${REF}" \
          -H "X-Internal-Token: ${TOKEN}" \
          -o /dev/null -w "HTTP %{http_code}\n"
      volumeMounts:
      - name: dlh-internal-token-vol
        mountPath: /var/run/secrets/dlh-internal-token
    volumes:
    - name: dlh-internal-token-vol
      secret:
        secretName: dlh-internal-token
