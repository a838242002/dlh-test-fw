apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dlh-controlplane
  namespace: dlh-test-fw
  labels:
    app.kubernetes.io/name: dlh-controlplane
    app.kubernetes.io/part-of: dlh-test-fw
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["dlh-roles"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["dlh-internal-token"]
  - apiGroups: ["chaos-mesh.org"]
    resources: ["schedules", "podchaos", "networkchaos"]
    verbs: ["get", "list", "watch", "create", "delete"]
