apiVersion: v1
kind: Namespace
metadata:
  name: kafka-sys
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka-sys
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        kafka.broker.id: "0"
    spec:
      containers:
      - name: kafka
        # Note: bitnami/kafka:3.7 was yanked by Bitnami in 2025 (secure-images migration).
        # Using apache/kafka official image instead; env vars use KAFKA_* not KAFKA_CFG_*.
        image: apache/kafka:3.7.0
        env:
        - { name: KAFKA_NODE_ID,                       value: "0" }
        - { name: KAFKA_PROCESS_ROLES,                 value: "broker,controller" }
        - { name: KAFKA_LISTENERS,                     value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
        - { name: KAFKA_ADVERTISED_LISTENERS,          value: "PLAINTEXT://kafka.kafka-sys.svc.cluster.local:9092" }
        - { name: KAFKA_CONTROLLER_QUORUM_VOTERS,      value: "0@kafka-0.kafka-headless.kafka-sys.svc.cluster.local:9093" }
        - { name: KAFKA_CONTROLLER_LISTENER_NAMES,     value: "CONTROLLER" }
        - { name: KAFKA_INTER_BROKER_LISTENER_NAME,    value: "PLAINTEXT" }
        - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
        - { name: CLUSTER_ID,                          value: "dlh-test-fw-cluster" }
        ports:
        - { containerPort: 9092, name: kafka }
        - { containerPort: 9093, name: controller }
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 500m, memory: 1Gi }
        readinessProbe:
          tcpSocket: { port: 9092 }
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka-sys
spec:
  selector:
    app: kafka
  ports:
  - port: 9092
    targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka-sys
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - { port: 9092, name: kafka }
  - { port: 9093, name: controller }
