apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-mysql-pod-delete
  namespace: dlh-test-fw
data:
  script.js: |
    import http from 'k6/http';
    import { sleep, check } from 'k6';
    export const options = {
      vus: parseInt(__ENV.VUS || '10'),
      duration: __ENV.DURATION || '180s',
      // NOTE: `dlh_scenario` is passed as --tag by load-k6-run WT; tags here
      // are app-level only. k6 reserves `scenario`, so we use `dlh_scenario`
      // in PromQL filters.
      tags: { dlh_scenario: 'mysql-pod-delete' },
    };
    // Phase 1 stand-in: k6 has no MySQL driver out of the box; we hit
    // httpbin in-cluster to exercise the platform mechanics. Swap the URL
    // for a service that proxies SQL when xk6-sql is wired up.
    export default function () {
      const r = http.get('http://httpbin.dlh-test-fw.svc.cluster.local/status/200');
      check(r, { 'status 2xx': (x) => x.status >= 200 && x.status < 300 });
      sleep(0.5);
    }
